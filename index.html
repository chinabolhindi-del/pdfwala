<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PDFWala Lite</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf-lib/1.17.1/pdf-lib.min.js"></script>

<style>
body{
  margin:0;
  font-family:sans-serif;
  background:#0d0d0d;
  color:#fff;
  text-align:center;
}

h1{margin-top:20px}
.container{padding:15px}

.btn{
  display:block;
  width:100%;
  margin:10px 0;
  padding:15px;
  border:none;
  border-radius:10px;
  background:#e63946;
  color:#fff;
  font-size:16px;
}

.card{
  background:#1c1c1c;
  padding:15px;
  border-radius:10px;
  margin-top:15px;
  display:none;
}

.card.active{display:block}

input{margin-top:10px}

</style>
</head>

<body>

<h1>PDFWala ⚡</h1>

<div class="container">

<button class="btn" onclick="openTool('merge')">Merge PDF</button>
<button class="btn" onclick="openTool('img')">Image to PDF</button>

<!-- MERGE -->
<div id="merge" class="card">
  <h3>Select PDFs</h3>
  <input type="file" multiple accept="application/pdf" onchange="loadMerge(event)">
  <button class="btn" onclick="mergePDF()">Merge</button>
  <a id="mergeDownload"></a>
</div>

<!-- IMG -->
<div id="img" class="card">
  <h3>Select Images</h3>
  <input type="file" multiple accept="image/png,image/jpeg" onchange="loadImg(event)">
  <button class="btn" onclick="imgToPDF()">Convert</button>
  <a id="imgDownload"></a>
</div>

</div>

<script>

// TOOL SWITCH
function openTool(id){
  document.querySelectorAll('.card').forEach(c=>c.classList.remove('active'))
  document.getElementById(id).classList.add('active')
}

// DATA
let mergeFiles=[]
let imgFiles=[]

// LOAD FILES
function loadMerge(e){
  mergeFiles = Array.from(e.target.files)
}

function loadImg(e){
  imgFiles = Array.from(e.target.files)
}

// MERGE
async function mergePDF(){
  if(mergeFiles.length < 2){
    alert("Select at least 2 PDFs")
    return
  }

  const pdfDoc = await PDFLib.PDFDocument.create()

  for(let file of mergeFiles){
    const bytes = await file.arrayBuffer()
    const pdf = await PDFLib.PDFDocument.load(bytes)
    const pages = await pdfDoc.copyPages(pdf, pdf.getPageIndices())
    pages.forEach(p => pdfDoc.addPage(p))
  }

  const merged = await pdfDoc.save()
  const blob = new Blob([merged], {type:'application/pdf'})

  const link = document.getElementById("mergeDownload")
  link.href = URL.createObjectURL(blob)
  link.download = "merged.pdf"
  link.innerText = "⬇ Download Merged PDF"
}

// IMG TO PDF
async function imgToPDF(){
  if(imgFiles.length === 0){
    alert("Select images")
    return
  }

  const pdfDoc = await PDFLib.PDFDocument.create()

  for(let file of imgFiles){
    const bytes = await file.arrayBuffer()

    let img
    if(file.type === "image/png"){
      img = await pdfDoc.embedPng(bytes)
    }else{
      img = await pdfDoc.embedJpg(bytes)
    }

    const page = pdfDoc.addPage([img.width, img.height])
    page.drawImage(img,{
      x:0,y:0,width:img.width,height:img.height
    })
  }

  const pdfBytes = await pdfDoc.save()
  const blob = new Blob([pdfBytes], {type:'application/pdf'})

  const link = document.getElementById("imgDownload")
  link.href = URL.createObjectURL(blob)
  link.download = "images.pdf"
  link.innerText = "⬇ Download PDF"
}

</script>

</body>
</html>
