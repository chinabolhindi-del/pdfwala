<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PDFWala</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf-lib/1.17.1/pdf-lib.min.js"></script>

<style>
body{margin:0;background:#090909;color:#fff;font-family:sans-serif}
nav{padding:15px;background:#111;position:fixed;width:100%;top:0}
.logo{font-weight:bold}
.sec{padding:80px 15px}
.tgrid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.tc{background:#1c1c1c;padding:15px;border-radius:10px;cursor:pointer}
.tc.at{border:1px solid red}

/* ✅ FIX */
.ws{display:none}
.ws.open{display:block}

.ws{background:#1c1c1c;padding:15px;border-radius:10px;margin-top:10px}

button{padding:10px;border:none;background:red;color:#fff;border-radius:8px;margin-top:10px}
</style>
</head>

<body>

<nav><div class="logo">PDFWala</div></nav>

<section class="sec">

<div class="tgrid">
<div class="tc" id="card-merge" onclick="openTool('merge')">Merge PDF</div>
<div class="tc" id="card-img2pdf" onclick="openTool('img2pdf')">Image to PDF</div>
</div>

<!-- MERGE -->
<div class="ws" id="ws-merge">
<h3>Merge PDF</h3>
<input type="file" multiple accept="application/pdf" onchange="handleMerge(event)">
<button onclick="mergePDFs()">Merge</button>
<a id="mdl"></a>
</div>

<!-- IMG -->
<div class="ws" id="ws-img2pdf">
<h3>Image to PDF</h3>
<input type="file" multiple accept="image/png,image/jpeg" onchange="handleImgs(event)">
<button onclick="imgs2pdf()">Convert</button>
<a id="idl"></a>
</div>

</section>

<script>

let mFiles=[], iFiles=[];

// ✅ FIXED
function openTool(id){
  document.querySelectorAll('.ws').forEach(w=>w.classList.remove('open'));
  document.querySelectorAll('.tc').forEach(c=>c.classList.remove('at'));

  document.getElementById('ws-'+id).classList.add('open');
  document.getElementById('card-'+id).classList.add('at');
}

// MERGE
function handleMerge(e){
  mFiles = Array.from(e.target.files);
}

async function mergePDFs(){
  if(mFiles.length<2){alert("2 PDF chahiye");return;}

  const pdfDoc = await PDFLib.PDFDocument.create();

  for(let f of mFiles){
    const bytes = await f.arrayBuffer();
    const pdf = await PDFLib.PDFDocument.load(bytes);
    const pages = await pdfDoc.copyPages(pdf, pdf.getPageIndices());
    pages.forEach(p=>pdfDoc.addPage(p));
  }

  const merged = await pdfDoc.save();
  const blob = new Blob([merged], {type:'application/pdf'});

  const link=document.getElementById("mdl");
  link.href=URL.createObjectURL(blob);
  link.download="merged.pdf";
  link.innerText="Download";
}

// IMG
function handleImgs(e){
  iFiles = Array.from(e.target.files);
}

async function imgs2pdf(){
  const pdfDoc = await PDFLib.PDFDocument.create();

  for(let f of iFiles){
    const bytes = await f.arrayBuffer();
    let img;

    if(f.type==="image/png"){
      img = await pdfDoc.embedPng(bytes);
    }else{
      img = await pdfDoc.embedJpg(bytes);
    }

    const page = pdfDoc.addPage([img.width,img.height]);
    page.drawImage(img,{x:0,y:0,width:img.width,height:img.height});
  }

  const pdfBytes = await pdfDoc.save();
  const blob = new Blob([pdfBytes], {type:'application/pdf'});

  const link=document.getElementById("idl");
  link.href=URL.createObjectURL(blob);
  link.download="images.pdf";
  link.innerText="Download";
}

</script>

</body>
</html>
